name: Kitchen App CI/CD

on:
  push:
    branches:
      - main
      - master
      - student/**
  pull_request:
    branches:
      - main
      - master

jobs:
  api-test:
    name: API Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: api-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t kitchen-api:local ./api --target production

      - name: Build Web UI image
        run: docker build -t kitchen-web:local ./web-ui

      - name: Validate compose file
        run: docker compose config

  k8s-smoke:
    name: Kubernetes Smoke
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kitchen-cluster

      - name: Build API image
        run: docker build -t kitchen-api:local ./api --target production

      - name: Build Web UI image
        run: docker build -t kitchen-web:local ./web-ui

      - name: Load images into kind
        run: |
          kind load docker-image kitchen-api:local --name kitchen-cluster
          kind load docker-image kitchen-web:local --name kitchen-cluster

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create configmaps and secret
        run: |
          kubectl create configmap api-config --from-literal=PORT=3000 --namespace kitchen-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap api-server-override --from-file=server.js=api/server.js --namespace kitchen-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic mongodb-secret --from-literal=mongo-root-username=admin --from-literal=mongo-root-password=Secret123! --from-literal=mongo-uri='mongodb://admin:Secret123!@mongodb-service.kitchen-app.svc.cluster.local:27017/kitchendb?authSource=admin' --namespace kitchen-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy MongoDB
        run: |
          kubectl apply -f k8s/db/statefulset.yaml
          kubectl rollout status statefulset/mongodb -n kitchen-app --timeout=180s

      - name: Initialize MongoDB admin user
        run: |
          kubectl exec -n kitchen-app mongodb-0 -- mongosh --quiet --eval "db.getSiblingDB('admin').createUser({user:'admin', pwd:'Secret123!', roles:[{role:'root', db:'admin'}]})" || true

      - name: Deploy API
        run: |
          kubectl apply -f k8s/api/deployment.yaml
          kubectl rollout status deployment/api-deployment -n kitchen-app --timeout=180s

      - name: Restart API after MongoDB init
        run: |
          kubectl rollout restart deployment/api-deployment -n kitchen-app
          kubectl rollout status deployment/api-deployment -n kitchen-app --timeout=180s

      - name: Deploy Web UI
        run: |
          kubectl apply -f k8s/web-ui/deployment.yaml
          kubectl rollout status deployment/web-ui-deployment -n kitchen-app --timeout=120s

      - name: Smoke test services
        run: |
          kubectl get pods -n kitchen-app
          kubectl get svc -n kitchen-app
          kubectl port-forward -n kitchen-app svc/api 3000:3000 >/tmp/api-port-forward.log 2>&1 &
          kubectl port-forward -n kitchen-app svc/web-ui-service 8080:80 >/tmp/web-port-forward.log 2>&1 &
          sleep 10
          curl -fsS http://localhost:3000/health
          curl -fsS -X POST http://localhost:3000/orders -H "Content-Type: application/json" -d '{"dish":"CI Validation Meal"}'
          curl -fsS http://localhost:3000/orders
          curl -fsS -o /dev/null http://localhost:8080
